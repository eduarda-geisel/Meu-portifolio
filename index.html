<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bonheur+Royale&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">

</head>
<body>
    <!-- Barra de início -->
    <header class="inicio"> 
        <div class="logo">Meu Portifólio Digital</div>
        <nav class="menu">
            <a href="#">Sobre mim</a>
            <i class="fa-regular fa-circle-question circulo"></i>
            <a href="#">Trabalhos</a>
            <i class="fa-regular fa-folder pasta"></i>
            <a href="#">Contatos</a>
            <i class="fa-regular fa-message mensagem"></i>
        </nav>
    </header>
    <!-- Parte principal -->
    <main class="principal">
        <h1>Olá, eu sou a Eduarda!</h1>
        <p>Estudante de Desecolvimentos De Sistemas em formação.</p>
        <!-- Parte dos projetos -->
        <section>
            <h1>Meus Projetos:</h1>
            <div class="cards">
                <div class="card">
                    <img class="um" src="img.um.jpg" alt="Projeto 1">
                    <p>Projeto 1.</p>
                </div>
                <div class="card">
                    <img class="dois" src="img.dois.png" alt="Projeto 2">
                    <p>Projeto 2.</p>
                </div>
                <div class="card">
                    <img class="tres" src="img.tres.jpg" alt="Projeto 3">
                    <p>Projeto 3.</p>
                </div>
                <div class="card">
                        <img class="quatro" src="img.quatro.jpg" alt="Projeto 4">
                    <p>Projeto 4.</p>
                </div>
                <div class="card">
                        <img class="cinco" src="img.cinco.jpg" alt="Projeto 5">
                    <p>Projeto 5.</p>
                </div>
                <div class="card">
                        <img class="seis" src="img.seis.jpg" alt="Projeto 6">
                    <p>Projeto 6.</p>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <h1>Voê chegou ao final...</h1>
        <p>Feito por Eduarda.</p>
        <i class="fa-brands fa-github"></i>
        <i class="fa-brands fa-linkedin"></i>
        <i class="fa-solid fa-envelope-open-text"></i>
    </footer>
</body>
</html>
